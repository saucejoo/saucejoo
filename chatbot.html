<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>saucejoo — minimi admin</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin>
<link rel="stylesheet" href="chat-widget.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#5cd3ff;
  --ink:#111;
  --bg:#fff;
  --b:1.8px solid #111;
  --sans:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
}
body{border-top:var(--b)}
.page{
  max-width:720px;
  margin:0 auto;
  padding:48px 24px 120px;
}
.page h1{
  font-size:clamp(24px,4vw,32px);
  font-weight:700;
  margin-bottom:12px;
}
.page p{
  font-size:14px;
  line-height:1.7;
  color:#555;
  margin-bottom:24px;
}
.page a{
  font-size:13px;
  font-weight:600;
  color:var(--ink);
}
.page a:hover{background:var(--yellow)}
</style>
</head>
<body>

<main class="page">
  <h1>미니미 관리자</h1>
  <p>메인(index)에서 들어온 질문에 답할 수 있어요. 왼쪽 아래 「관리자」 버튼을 누르세요.</p>
  <a href="index.html">← portfolio로 돌아가기</a>
</main>

<div class="chat-root" id="chatRoot" aria-live="polite">
  <div class="chat-panel" id="chatPanel" role="dialog" aria-label="미니미 채팅" aria-hidden="true">
    <header class="chat-head">
      <img class="chat-head-avatar" src="assets/minimi-chef.svg" alt="" width="36" height="40">
      <div class="chat-head-text">
        <strong>미니미</strong>
        <span>주방장 · 바로 답해요 · 모르면 연주 셰프가 답해요</span>
      </div>
      <button type="button" class="chat-close" id="chatClose" aria-label="채팅 닫기">✕</button>
    </header>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-chips" id="chatChips"></div>
    <form class="chat-input-row" id="chatForm">
      <input type="text" class="chat-input" id="chatInput" placeholder="궁금한 걸 물어보세요…" autocomplete="off" maxlength="500">
      <button type="submit" class="chat-send" aria-label="보내기">↑</button>
    </form>
  </div>
  <div class="chat-wander" id="chatWander">
    <button type="button" class="chat-launcher" id="chatLauncher" aria-label="미니미 셰프 — 채팅 열기" aria-expanded="false">
      <span class="chat-badge" id="chatBadge">0</span>
    </button>
  </div>
</div>

<button type="button" class="admin-toggle" id="adminToggle">관리자</button>

<div class="admin-panel" id="adminPanel" aria-hidden="true">
  <div class="admin-sheet" role="dialog" aria-labelledby="adminTitle">
    <header class="admin-head">
      <h2 id="adminTitle">대기 중인 질문</h2>
      <button type="button" class="chat-close" id="adminClose" aria-label="닫기">✕</button>
    </header>
    <div class="admin-body" id="adminBody"></div>
    <footer class="admin-foot">
      index.html 방문자 질문에 답하면 해당 세션 채팅에 표시됩니다.
    </footer>
  </div>
</div>

<script src="chat-widget.js"></script>
</body>
</html>
